<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}FaceTrack{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #6ee7b7;
      --accent2: #818cf8;
      --danger: #f87171;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--text); }

    .nav-links { display: flex; gap: 0.5rem; }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      transition: all 0.2s;
      font-weight: 500;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--text);
      background: var(--border);
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      margin-bottom: 0.4rem;
      letter-spacing: -0.5px;
    }

    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.3rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--accent); color: #0a0a0f; }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #252535; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: 0.85; }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-present { background: rgba(110,231,183,0.1); color: var(--accent); border: 1px solid rgba(110,231,183,0.2); }
    .badge-absent { background: rgba(248,113,113,0.1); color: var(--danger); border: 1px solid rgba(248,113,113,0.2); }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.8rem 1.2rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 500;
      z-index: 999;
      animation: slideIn 0.3s ease;
      max-width: 280px;
    }

    .toast-success { background: var(--accent); color: #0a0a0f; }
    .toast-error { background: var(--danger); color: #fff; }

    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="logo" href="/">Face<span>Track</span></a>
    <div class="nav-links">
      <a href="/" id="nav-home">Home</a>
      <a href="/register" id="nav-register">Register</a>
      <a href="/scan" id="nav-scan">Scan</a>
      <a href="/results" id="nav-results">Results</a>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <script>
    // Highlight active nav
    const path = window.location.pathname;
    document.querySelectorAll('.nav-links a').forEach(a => {
      if (a.getAttribute('href') === path) a.classList.add('active');
    });

    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
  </script>
</body>
</html>
